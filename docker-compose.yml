services:
  app:
    build: .
    container_name: nexuscloud
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_URL=http://187.77.183.14:3000
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - UPLOAD_DIR=/app/uploads
      - DATA_DIR=/app/data
    secrets:
      - jwt_secret
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - nexuscloud_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: nexuscloud_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - nexuscloud_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

secrets:
  jwt_secret:
    external: true

networks:
  nexuscloud_network:
    driver: bridge

volumes:
  redis_data: