services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexuscloud_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_URL=http://localhost:3000
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - UPLOAD_DIR=/app/uploads
      - DATA_DIR=/app/data
      - REDIS_HOST=redis
    secrets:
      - jwt_secret
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: nexuscloud_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data

volumes:
  redis_data:

secrets:
  jwt_secret:
    external: true
